<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stadtrat Sitzungsprotokoll</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:  { dark: '#5A070A', DEFAULT: '#9B0000', bright: '#E6001E' },
            accent:   { DEFAULT: '#B39F7A', light: '#E8DFCF' },
            bg:       '#FAF8F5',
            surface:  '#FFFFFF',
            brd:      '#E8E2D8',
            'tx':     '#2D2D2D',
            'tx-m':   '#777777',
            vote:     { yes: '#78BE1E', no: '#9B0000' },
            absent:   '#B0B0B0',
            info:     '#5B9BD5',
          },
          fontFamily: {
            sans:  ['Noto Sans', 'system-ui', 'sans-serif'],
            serif: ['Noto Serif', 'Georgia', 'serif'],
          },
          boxShadow: {
            card:   '0 1px 3px rgba(0,0,0,0.07)',
            'card-lg': '0 4px 16px rgba(0,0,0,0.10)',
          },
        }
      }
    };
  </script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel standalone (transforms JSX in-browser) -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- JSZip for ZIP export -->
  <script crossorigin src="https://unpkg.com/jszip@3/dist/jszip.min.js"></script>

  <style>
    body { background: #FAF8F5; color: #2D2D2D; }

    /* Responsive seat circles */
    .seat-circle {
      width: clamp(32px, 5.5vw, 50px);
      height: clamp(32px, 5.5vw, 50px);
      font-size: clamp(10px, 1.6vw, 13px);
    }
    .seat-initials { pointer-events: none; }

    .seat-node { transition: all 0.2s ease; cursor: pointer; user-select: none; }
    .seat-node:hover { filter: brightness(1.1); }
    .seat-node.disabled { cursor: default; opacity: 0.25; pointer-events: none; }
    .seat-node.absent-seat { opacity: 0.45; }
    .vote-indicator { cursor: pointer; z-index: 10; transition: transform 0.1s; }
    .vote-indicator:hover { transform: scale(1.2); }
    .seat-vote-badge { width: 20px; height: 20px; font-size: 11px; }
    @media (max-width: 640px) {
      .seat-vote-badge { width: 13px; height: 13px; font-size: 8px; }
    }
    .vote-badge { animation: pop 0.15s ease; }
    @keyframes pop { 0% { transform: scale(0.7); } 100% { transform: scale(1); } }
    .log-enter { animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    .council-circle-container { min-height: 300px; }

    /* Outside labels */
    .seat-label-outside {
      position: absolute;
      white-space: nowrap;
      font-size: clamp(8px, 1.3vw, 11px);
      background: rgba(255,255,255,0.92);
      border-radius: 4px;
      padding: 1px 5px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      pointer-events: none;
      line-height: 1.2;
    }
    .seat-label-outside.lbl-above { bottom: 100%; left: 50%; transform: translateX(-50%); margin-bottom: 3px; }
    .seat-label-outside.lbl-left  { right: 100%; top: 50%; transform: translateY(-50%); margin-right: 5px; text-align: right; }
    .seat-label-outside.lbl-right { left: 100%; top: 50%; transform: translateY(-50%); margin-left: 5px; text-align: left; }
    .seat-label-outside.lbl-below { top: 100%; left: 50%; transform: translateX(-50%); margin-top: 3px; }

    @media (max-width: 640px) {
      .seat-circle { width: clamp(24px, 8vw, 38px); height: clamp(24px, 8vw, 38px); font-size: clamp(9px, 2.5vw, 12px); }
      .seat-label-outside { font-size: clamp(6px, 1.8vw, 9px); padding: 0 3px; }
    }

    .tab-active { border-bottom: 2px solid #9B0000; color: #9B0000; font-weight: 600; }
    .tab-inactive { border-bottom: 2px solid transparent; color: #777; }
  </style>
</head>
<body class="min-h-screen font-sans">
  <div id="root"></div>

  <!-- Data processing helpers (plain JS, no JSX) -->
  <script src="js/data.js"></script>
  <!-- React app (JSX compiled by Babel standalone) -->
  <script type="text/babel" src="js/app.js"></script>
</body>
</html>
